<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Craftcoin Network</title>
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --accent: #10b981;
            --text: #f8fafc;
            --text-muted: #94a3b8;
        }
        body {
            font-family: system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        header {
            text-align: center;
            margin-bottom: 40px;
        }
        h1 { color: var(--accent); margin-bottom: 5px; }
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        .card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }
        .full-width { grid-column: span 2; }
        input, button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border-radius: 6px;
            border: 1px solid #334155;
            box-sizing: border-box;
        }
        input { background: #0f172a; color: white; }
        button {
            background: var(--accent);
            color: #0f172a;
            font-weight: bold;
            cursor: pointer;
            border: none;
            transition: opacity 0.2s;
        }
        button:hover { opacity: 0.9; }
        .log-box {
            background: #090d16;
            padding: 15px;
            border-radius: 6px;
            font-family: monospace;
            max-height: 200px;
            overflow-y: auto;
            white-space: pre-wrap;
            font-size: 13px;
        }
        .block-item {
            border-left: 4px solid var(--accent);
            padding-left: 10px;
            margin-bottom: 15px;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>🛠️ Craftcoin Network</h1>
        <p style="color: var(--text-muted);">Decentralized Static Blockchain Simulation</p>
    </header>

    <div class="grid">
        <!-- Node Balance Wallet -->
        <div class="card">
            <h3>Local Wallet Node</h3>
            <p>Address: <span id="wallet-address" style="color: var(--accent); font-family: monospace;">Loading...</span></p>
            <h2>Balance: <span id="balance-display">0</span> CC</h2>
            <button onclick="mineBlock()">⛏️ Mine New Block (+50 CC)</button>
        </div>

        <!-- Create Transaction -->
        <div class="card">
            <h3>Send Craftcoin</h3>
            <input type="text" id="recipient" placeholder="Recipient Address">
            <input type="number" id="amount" placeholder="Amount (CC)">
            <button onclick="sendCoins()">Send Transaction</button>
        </div>

        <!-- Ledger -->
        <div class="card full-width">
            <h3>Blockchain Ledger</h3>
            <div id="blockchain-ledger"></div>
        </div>

        <!-- Network Console -->
        <div class="card full-width">
            <h3>Network Logs</h3>
            <div id="network-logs" class="log-box"></div>
        </div>
    </div>
</div>

<script>
    // --- SERVERLESS BACKEND ENGINE (In-Browser Blockchain) ---
    class Block {
        constructor(index, timestamp, transactions, previousHash = '') {
            this.index = index;
            this.timestamp = timestamp;
            this.transactions = transactions;
            this.previousHash = previousHash;
            this.nonce = 0;
            this.hash = this.calculateHash();
        }

        calculateHash() {
            // Simple deterministic string hashing for frontend safety
            let str = this.index + this.timestamp + JSON.stringify(this.transactions) + this.previousHash + this.nonce;
            let hash = 0;
            for (let i = 0; i < str.length; i++) {
                hash = (hash << 5) - hash + str.charCodeAt(i);
                hash |= 0;
            }
            return Math.abs(hash).toString(16);
        }

        mineBlock(difficulty) {
            while (this.hash.substring(0, difficulty) !== Array(difficulty + 1).join("0")) {
                this.nonce++;
                this.hash = this.calculateHash();
            }
        }
    }

    class Blockchain {
        constructor() {
            this.chain = [this.createGenesisBlock()];
            this.difficulty = 2;
            this.pendingTransactions = [];
            this.miningReward = 50;
        }

        createGenesisBlock() {
            return new Block(0, "05/17/2026", "Genesis Block", "0");
        }

        getLatestBlock() {
            return this.chain[this.chain.length - 1];
        }

        minePendingTransactions(miningRewardAddress) {
            let block = new Block(this.chain.length, Date.now(), this.pendingTransactions, this.getLatestBlock().hash);
            block.mineBlock(this.difficulty);

            this.chain.push(block);
            this.pendingTransactions = [
                { from: "Network System", to: miningRewardAddress, amount: this.miningReward }
            ];
            this.saveToStorage();
        }

        addTransaction(transaction) {
            this.pendingTransactions.push(transaction);
        }

        getBalanceOfAddress(address) {
            let balance = 0;
            for (const block of this.chain) {
                if(typeof block.transactions === 'string') continue;
                for (const trans of block.transactions) {
                    if (trans.from === address) balance -= trans.amount;
                    if (trans.to === address) balance += trans.amount;
                }
            }
            return balance;
        }

        saveToStorage() {
            localStorage.setItem('craftcoin_chain', JSON.stringify(this.chain));
        }

        loadFromStorage() {
            const saved = localStorage.getItem('craftcoin_chain');
            if(saved) {
                this.chain = JSON.parse(saved);
            }
        }
    }

    // --- UI CONTROLLER & APP SETUP ---
    const craftCoin = new Blockchain();
    craftCoin.loadFromStorage();

    // Generate a persistent mock address for this specific visitor browser session
    if (!localStorage.getItem('cc_address')) {
        localStorage.setItem('cc_address', 'cc_' + Math.random().toString(36).substring(2, 11));
    }
    const myAddress = localStorage.getItem('cc_address');

    function log(message) {
        const logs = document.getElementById('network-logs');
        logs.innerHTML += `[${new Date().toLocaleTimeString()}] ${message}\n`;
        logs.scrollTop = logs.scrollHeight;
    }

    function updateUI() {
        document.getElementById('wallet-address').innerText = myAddress;
        document.getElementById('balance-display').innerText = craftCoin.getBalanceOfAddress(myAddress);

        const ledger = document.getElementById('blockchain-ledger');
        ledger.innerHTML = '';

        [...craftCoin.chain].reverse().forEach(block => {
            ledger.innerHTML += `
                <div class="block-item">
                    <strong>Block #${block.index}</strong> (Hash: ${block.hash.substring(0,12)}...) <br>
                    <small style="color:var(--text-muted)">Prev Hash: ${block.previousHash.substring(0,12)}... | Nonce: ${block.nonce}</small><br>
                    <span style="font-size:12px;">Data: ${JSON.stringify(block.transactions)}</span>
                </div>
            `;
        });
    }

    function mineBlock() {
        log("Starting node miner execution...");
        craftCoin.minePendingTransactions(myAddress);
        log(`Block successfully mined! 50 CC reward processed to wallet.`);
        updateUI();
    }

    function sendCoins() {
        const to = document.getElementById('recipient').value;
        const amount = parseFloat(document.getElementById('amount').value);
        const myBalance = craftCoin.getBalanceOfAddress(myAddress);

        if (!to || !amount || amount <= 0) {
            alert("Please complete all fields with accurate variables.");
            return;
        }
        if (amount > myBalance) {
            alert("Error: Insufficient network balance.");
            return;
        }

        craftCoin.addTransaction({ from: myAddress, to: to, amount: amount });
        log(`Pending transaction broadcasted: ${amount} CC to ${to.substring(0,8)}...`);
        document.getElementById('recipient').value = '';
        document.getElementById('amount').value = '';
        updateUI();
    }

    // Initial Run
    log("Craftcoin Engine Initialized successfully.");
    updateUI();
</script>
</body>
</html>
